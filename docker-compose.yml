services:
  frontend:
    build: ./frontend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  backend:
    build: .
    env_file: .env
    ports:
      - "${APP_PORT:-8000}:8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build: .
    command: ["arq", "app.automation.worker.WorkerSettings"]
    env_file: .env
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "arq", "app.automation.worker.WorkerSettings", "--check"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    stop_grace_period: 30s
    restart: unless-stopped

  scheduler:
    build: .
    command: ["python", "-m", "app.automation.scheduler"]
    env_file: .env
    depends_on:
      worker:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-m", "app.automation.healthcheck", "scheduler"]
      interval: 30s
      timeout: 10s
      retries: 3
    stop_grace_period: 30s
    restart: unless-stopped

  migrate:
    build: .
    command: ["alembic", "upgrade", "head"]
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-auto_invest}
      POSTGRES_USER: ${POSTGRES_USER:-auto_invest}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
